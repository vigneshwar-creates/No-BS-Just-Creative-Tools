<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Metadata — JCT</title>
  <meta name="description" content="View EXIF metadata from images.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
  <script src="../js/shared.js" defer></script>
  <script src="../js/metadata.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div style="display: flex; align-items: center; gap: 24px;">
        <a href="../index.html" class="logo">JC<span>T</span></a>
        <a href="../index.html" class="back-btn" style="font-size: 0.65rem;">← BACK</a>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
          <span class="icon-moon">◐</span>
          <span class="icon-sun">◑</span>
        </button>
        <a href="https://www.buymeacoffee.com/gammem" target="_blank" rel="noopener" class="donate-btn">DONATE</a>
      </div>
    </div>
  </header>

  

  <main class="main">
    <div class="tool-page-header fade-in">
      <span class="tool-page-tag">IMAGE TOOLS</span>
      <h1 class="tool-page-title">[ℹ] IMAGE<br>METADATA</h1>
      <p class="tool-page-desc">View EXIF metadata from images. All processing happens in your browser.</p>
    </div>

    <div class="tool-layout">
      <div class="panel fade-in">
        <div class="panel-header">
          <div class="panel-header-left">
            <div class="panel-dots"><div class="panel-dot"></div><div class="panel-dot"></div><div class="panel-dot"></div></div>
            <span class="panel-label">INPUT</span>
          </div>
        </div>
        <div class="panel-body">
          <div class="drop-zone" id="metadata-drop-zone" style="min-height: 150px;">
            <span class="drop-zone-icon">◈</span>
            <p class="drop-zone-text">Drop image here or click</p>
            <input type="file" accept="image/*" id="metadata-file-input" hidden>
          </div>

          <div class="btn-group" style="margin-top: 20px;">
            <button class="btn btn-outline" id="metadata-clear">CLEAR</button>
          </div>
        </div>
      </div>

      <div class="panel fade-in">
        <div class="panel-header">
          <div class="panel-header-left">
            <div class="panel-dots"><div class="panel-dot"></div><div class="panel-dot"></div><div class="panel-dot"></div></div>
            <span class="panel-label">METADATA</span>
          </div>
        </div>
        <div class="panel-body" style="min-height: 300px; background: #0d0d0d;">
          <div id="metadata-empty" style="text-align:center;padding:60px;color:var(--text-muted)">
            <div style="font-size:3rem;opacity:0.2;margin-bottom:16px">◫</div>
            <p style="font-size:0.65rem;letter-spacing:3px;text-transform:uppercase">Upload an image</p>
          </div>
          <div id="metadata-display" class="hidden" style="padding: 16px; font-size: 0.7rem; line-height: 1.8;">
            <div id="metadata-content"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p class="footer-text">JUST CREATIVE TOOLS © 2026 — <a href="LICENSE" style="color: inherit; text-decoration: underline;">MIT LICENSE</a></p>
    <p class="footer-text">BUILT BRUTAL — NO DEPENDENCIES — RUNS IN YOUR BROWSER</p>
    <a href="../index.html" class="footer-text" style="color:var(--accent)">← ALL TOOLS</a>
  
    
  </footer>
<script src="../js/common.js"></script>`n</body>
</html>
